<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لعبة بسيطة</title>

<style>
body{
    text-align:center;
    font-family:Arial;
    margin-top:100px;
}

button{
    padding:15px 30px;
    font-size:20px;
}
</style>

</head>
<body>

<h1>اضغط واربح نقاط</h1>

<h2 id="score">0</h2>

<button onclick="addPoint()">اضغط</button>

<script>
let score = 0;

function addPoint(){
    score++;
    document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
