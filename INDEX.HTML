<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كاميرا الويب</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2c3e50);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
    }

    video {
        width: 90%;
        max-width: 500px;
        border-radius: 15px;
        border: 3px solid #00ffc3;
        box-shadow: 0 0 20px rgba(0,255,195,0.4);
        margin-bottom: 20px;
    }

    .buttons {
        display: flex;
        gap: 10px;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    .start {
        background: #00ffc3;
        color: #000;
    }

    .stop {
        background: #ff4d4d;
        color: #fff;
    }

    button:hover {
        transform: scale(1.05);
    }
</style>
</head>

<body>

<h1>🎥 كاميرا الويب</h1>

<video id="video" autoplay playsinline></video>

<div class="buttons">
    <button class="start" onclick="startCamera()">تشغيل الكاميرا</button>
    <button class="stop" onclick="stopCamera()">إيقاف الكاميرا</button>
</div>

<script>
let stream;

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
    .then(s => {
        stream = s;
        document.getElementById("video").srcObject = stream;
    })
    .catch(err => {
        alert("لم يتم السماح باستخدام الكاميرا");
        console.log(err);
    });
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        document.getElementById("video").srcObject = null;
    }
}
</script>

</body>
</html>
